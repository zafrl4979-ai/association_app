name: future_lovers_association
description: Future Lovers Association
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  firebase_storage: ^12.3.3
  firebase_messaging: ^15.1.3
  provider: ^6.1.2
  lottie: ^3.1.2
  animate_do: ^3.3.4
  flutter_animate: ^4.5.0
  google_fonts: ^6.2.1
  font_awesome_flutter: ^10.7.0
  intl: ^0.19.0
  uuid: ^4.5.1
  shared_preferences: ^2.3.2
  pdf: ^3.11.1
  printing: ^5.13.4
  qr_flutter: ^4.1.0
  url_launcher: ^6.3.1
  flutter_local_notifications: ^17.2.3
  image_picker: ^1.1.2
  connectivity_plus: ^6.0.5
  local_auth: ^2.3.0
  file_picker: ^8.0.0
  open_file: ^3.3.2
  date_format: ^2.0.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/logo.png
    - assets/signature.png
    - assets/robot.json

  fonts:
    - family: Cairo
      fonts:
        - asset: assets/fonts/Cairo-Regular.ttf
        - asset: assets/fonts/Cairo-Bold.ttf
          weight: 700
